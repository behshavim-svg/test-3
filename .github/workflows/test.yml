name: Deploy test

on:
  repository_dispatch:
    types: [start-xray]
  workflow_dispatch:

jobs:
  run-bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Config Folder
        run: mkdir -p ./xray-config

      - name: Write Xray Config
        run: |
          cat <<EOF > ./xray-config/config.json
          {
            "log": { "loglevel": "info" },
            "dns": {
              "servers": ["1.1.1.1", "8.8.8.8"]
            },
            "reverse": {
              "bridges": [{"tag": "github-bridge", "domain": "tunnel.github.internal"}]
            },
            "outbounds": [
              {
                "tag": "tunnel-to-core",
                "protocol": "vless",
                "settings": {
                  "vnext": [{"address": "${{ secrets.DOMAIN }}", "port": 443, "users": [{"id": "${{ secrets.UUID }}", "encryption": "none"}]}]
                },
                "streamSettings": {
                  "network": "ws",
                  "security": "tls",
                  "tlsSettings": {"allowInsecure": false, "serverName": "${{ secrets.DOMAIN }}"},
                  "wsSettings": {"path": "/edge", "headers": { "Host": "${{ secrets.DOMAIN }}" }},
                  "sockopt": {
                    "tcpKeepAliveIdle": 30,
                    "tcpKeepAliveInterval": 5
                  }
                }
              },
              { 
                "tag": "out-direct", 
                "protocol": "freedom",
                "settings": { "domainStrategy": "UseIP" }
              },
              { "tag": "block", "protocol": "blackhole" }
            ],
            "routing": {
              "domainStrategy": "AsIs",
              "rules": [
                {
                  "type": "field",
                  "domain": ["full:tunnel.github.internal"],
                  "outboundTag": "tunnel-to-core"
                },
                {
                  "type": "field",
                  "outboundTag": "block",
                  "domain": ["full:reverse", "regexp:.*\\\\.internal$"]
                },
                {
                  "type": "field",
                  "inboundTag": ["github-bridge"],
                  "outboundTag": "out-direct"
                }
              ]
            }
          }
          EOF

      - name: Run Xray
        run: |
          docker run -d --name xray-bridge \
            -v $(pwd)/xray-config:/etc/xray \
            teddysun/xray:24.11.30 \
            xray -config /etc/xray/config.json
          
          echo "--- Waiting for container to initialize ---"
          sleep 10
          
          echo "--- Real-time Container Logs ---"
          docker logs -f xray-bridge &
          
          echo "----------------------"
          echo "Bridge is active. Maintaining connection for 5 hours..."
          sleep 18000
